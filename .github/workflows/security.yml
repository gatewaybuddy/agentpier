name: Security Audit

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

jobs:
  security-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit

    - name: Install SDK dependencies
      run: |
        cd sdk/python
        pip install -e .

    - name: Install CrewAI integration dependencies
      run: |
        cd integrations/crewai
        pip install -e . || echo "CrewAI integration install failed, continuing with audit"
      continue-on-error: true

    - name: Install Langchain integration dependencies
      run: |
        cd integrations/langchain
        pip install -e . || echo "Langchain integration install failed, continuing with audit"
      continue-on-error: true

    - name: Run pip-audit on SDK
      run: |
        cd sdk/python
        pip-audit --format=json --output=sdk-audit.json || echo "Vulnerabilities found in SDK (expected)"
        pip-audit --desc || echo "Vulnerabilities found in SDK (expected)"

    - name: Run pip-audit on CrewAI integration
      run: |
        cd integrations/crewai
        if pip list | grep -q crewai; then
          pip-audit --format=json --output=crewai-audit.json || true
          pip-audit --desc || echo "CrewAI audit failed"
        else
          echo "CrewAI not installed, skipping audit"
          echo '{"vulnerabilities": []}' > crewai-audit.json
        fi
      continue-on-error: true

    - name: Run pip-audit on Langchain integration
      run: |
        cd integrations/langchain
        if pip list | grep -q langchain; then
          pip-audit --format=json --output=langchain-audit.json || true
          pip-audit --desc || echo "Langchain audit failed"
        else
          echo "Langchain not installed, skipping audit"
          echo '{"vulnerabilities": []}' > langchain-audit.json
        fi
      continue-on-error: true

    - name: Check for HIGH severity vulnerabilities
      run: |
        # Combine all audit results and check for HIGH severity issues
        python3 -c "
        import json
        import sys
        import glob
        
        all_vulns = []
        high_vulns = []
        
        for audit_file in glob.glob('*/*-audit.json'):
            try:
                with open(audit_file, 'r') as f:
                    data = json.load(f)
                    if 'vulnerabilities' in data:
                        for vuln in data['vulnerabilities']:
                            vuln_id = vuln.get('id', 'unknown')
                            vuln_name = vuln.get('package', {}).get('name', 'unknown')
                            vuln_version = vuln.get('package', {}).get('version', 'unknown')
                            aliases = vuln.get('aliases', [])
                            
                            all_vulns.append(f'{vuln_name} {vuln_version}: {vuln_id}')
                            
                            # Simple heuristic: if any alias starts with GHSA- assume it's reportable
                            # Real HIGH severity detection would need more sophisticated parsing
                            if any(str(alias).startswith('CVE-') and ('HIGH' in str(vuln).upper() or 'CRITICAL' in str(vuln).upper()) for alias in aliases):
                                high_vulns.append(f'{vuln_name} {vuln_version}: {vuln_id}')
            except (FileNotFoundError, json.JSONDecodeError) as e:
                print(f'Warning: Could not parse {audit_file}: {e}')
                continue
        
        if all_vulns:
            print(f'🔍 Found {len(all_vulns)} security advisories:')
            for vuln in all_vulns:
                print(f'  - {vuln}')
        
        if high_vulns:
            print(f'❌ {len(high_vulns)} HIGH/CRITICAL severity vulnerabilities require immediate attention:')
            for vuln in high_vulns:
                print(f'  - {vuln}')
            sys.exit(1)
        else:
            print('✅ No HIGH/CRITICAL severity vulnerabilities detected')
            if all_vulns:
                print('💡 Consider updating dependencies to address reported advisories')
        "

    - name: Check vulnerability count for notifications
      id: vuln-count
      continue-on-error: true
      run: |
        # Extract vulnerability counts for notification
        total_vulns=0
        high_vulns=0
        
        for audit_file in */*-audit.json; do
          if [ -f "$audit_file" ]; then
            python3 -c "
        import json
        import sys
        
        with open('$audit_file', 'r') as f:
            data = json.load(f)
            vulns = data.get('vulnerabilities', [])
            total = len(vulns)
            high = 0
            
            for vuln in vulns:
                vuln_str = json.dumps(vuln).upper()
                if 'HIGH' in vuln_str or 'CRITICAL' in vuln_str:
                    high += 1
            
            print(f'TOTAL: {total}')
            print(f'HIGH: {high}')
        " >> vuln_counts.txt
          fi
        done
        
        if [ -f "vuln_counts.txt" ]; then
          total_vulns=$(grep "TOTAL:" vuln_counts.txt | awk -F': ' '{sum += $2} END {print sum}')
          high_vulns=$(grep "HIGH:" vuln_counts.txt | awk -F': ' '{sum += $2} END {print sum}')
        fi
        
        echo "total_vulnerabilities=${total_vulns:-0}" >> $GITHUB_OUTPUT
        echo "high_vulnerabilities=${high_vulns:-0}" >> $GITHUB_OUTPUT
        
        # Determine severity for notification
        if [ "${high_vulns:-0}" -gt 0 ]; then
          echo "severity=HIGH" >> $GITHUB_OUTPUT
        elif [ "${total_vulns:-0}" -gt 0 ]; then
          echo "severity=MEDIUM" >> $GITHUB_OUTPUT
        else
          echo "severity=LOW" >> $GITHUB_OUTPUT
        fi

    - name: Upload audit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-audit-results-${{ matrix.python-version }}
        path: |
          */*-audit.json
        retention-days: 30

  # Security notification job - runs after all matrix jobs complete
  notify-security:
    needs: security-audit
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download audit results
        uses: actions/download-artifact@v4
        with:
          pattern: security-audit-results-*
          merge-multiple: true

      - name: Analyze aggregated results
        id: analyze
        run: |
          total_vulns=0
          high_vulns=0
          vuln_details=""
          
          for audit_file in *-audit.json; do
            if [ -f "$audit_file" ]; then
              echo "Processing $audit_file"
              python3 -c "
          import json
          import sys
          
          with open('$audit_file', 'r') as f:
              data = json.load(f)
              vulns = data.get('vulnerabilities', [])
              
              for vuln in vulns:
                  vuln_id = vuln.get('id', 'unknown')
                  vuln_name = vuln.get('package', {}).get('name', 'unknown')
                  vuln_version = vuln.get('package', {}).get('version', 'unknown')
                  
                  print(f'VULN: {vuln_name} {vuln_version}: {vuln_id}')
                  
                  # Check for HIGH/CRITICAL
                  vuln_str = json.dumps(vuln).upper()
                  if 'HIGH' in vuln_str or 'CRITICAL' in vuln_str:
                      print(f'HIGH: {vuln_name} {vuln_version}: {vuln_id}')
          " >> analysis.txt
            fi
          done
          
          if [ -f "analysis.txt" ]; then
            total_vulns=$(grep "^VULN:" analysis.txt | wc -l)
            high_vulns=$(grep "^HIGH:" analysis.txt | wc -l)
            vuln_details=$(grep "^HIGH:" analysis.txt | head -5 | sed 's/^HIGH: /• /' | tr '\n' '\n')
          fi
          
          echo "total_vulnerabilities=${total_vulns:-0}" >> $GITHUB_OUTPUT
          echo "high_vulnerabilities=${high_vulns:-0}" >> $GITHUB_OUTPUT
          
          if [ "${high_vulns:-0}" -gt 0 ]; then
            echo "severity=HIGH" >> $GITHUB_OUTPUT
          elif [ "${total_vulns:-0}" -gt 0 ]; then
            echo "severity=MEDIUM" >> $GITHUB_OUTPUT
          else
            echo "severity=LOW" >> $GITHUB_OUTPUT
          fi
          
          echo "vuln_details<<EOF" >> $GITHUB_OUTPUT
          echo "$vuln_details" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Call notification workflow
        if: steps.analyze.outputs.high_vulnerabilities != '0' || steps.analyze.outputs.total_vulnerabilities != '0'
        uses: ./.github/workflows/security-notify.yml
        with:
          project_name: "AgentPier"
          severity: ${{ steps.analyze.outputs.severity }}
          vulnerability_count: ${{ steps.analyze.outputs.total_vulnerabilities }}
          scan_type: "Python Dependencies (pip-audit)"
          details: ${{ steps.analyze.outputs.vuln_details }}
        secrets:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}