version = 0.1

[default.global.parameters]
stack_name = "agentpier-dev"

[dev]
[dev.deploy.parameters]
stack_name = "agentpier-dev"
s3_bucket = "aws-sam-cli-managed-default-samclisourcebucket-agentpier"
s3_prefix = "agentpier-dev"
region = "us-east-1"
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND"
confirm_changeset = false
template_file = "infra/template.yaml"
parameter_overrides = "Stage=dev"
tags = "project=agentpier environment=dev"

[prod]
[prod.deploy.parameters]
stack_name = "agentpier-prod"
s3_bucket = "aws-sam-cli-managed-default-samclisourcebucket-agentpier"
s3_prefix = "agentpier-prod"
region = "us-east-1"
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND"
confirm_changeset = true
template_file = "infra/template.yaml"
parameter_overrides = "Stage=prod"
tags = "project=agentpier environment=prod"
