            RestApiId: !Ref AgentPierApi
            Path: /vtokens/{token}/verify
            Method: GET

  ClaimVTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-claim-vtoken-${Stage}
      Handler: handlers.vtokens.claim_vtoken
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /vtokens/{token}/claim
            Method: POST

  ListVTokensFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-list-vtokens-${Stage}
      Handler: handlers.vtokens.list_vtokens
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /vtokens
            Method: GET

  GetVTokenClaimsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-get-vtoken-claims-${Stage}
      Handler: handlers.vtokens.get_vtoken_claims
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /vtokens/{token}/claims
            Method: GET

  # ============================================
  # Certification Standards API (Issue #46)
  # ============================================

  GetStandardsCurrentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-get-standards-current-${Stage}
      Handler: handlers.standards.get_standards_current
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /standards/current
            Method: GET

  GetStandardsAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-get-standards-agent-${Stage}
      Handler: handlers.standards.get_standards_agent
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /standards/agent
            Method: GET

  GetStandardsMarketplaceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-get-standards-marketplace-${Stage}
      Handler: handlers.standards.get_standards_marketplace
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /standards/marketplace
            Method: GET

  # ============================================
  # Rate Limiting Monitoring Endpoints
  # ============================================
  
  GetRateLimitInfoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-rate-limit-info-${Stage}
      Handler: handlers.rate_limit_info.get_rate_limit_info
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /rate-limits
            Method: GET

  GetRateLimitStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-rate-limit-status-${Stage}
      Handler: handlers.rate_limit_info.get_rate_limit_status
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /rate-limits/status
            Method: GET

  GetRateLimitConfigFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-rate-limit-config-${Stage}
      Handler: handlers.rate_limit_info.get_rate_limit_config
      CodeUri: ../src/
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /rate-limits/config
            Method: GET

  # ============================================
  # DynamoDB — Single Table Design
  # ============================================
  AgentPierTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub agentpier-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      # TTL configured via CLI (CloudFormation role lacks dynamodb:UpdateTimeToLive)
      # aws dynamodb update-time-to-live --table-name agentpier-dev --time-to-live-specification "Enabled=true,AttributeName=ttl"
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ============================================
  # ElastiCache Redis — Rate Limiting Cache
  # ============================================
  RateLimitCacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      CacheSubnetGroupName: !Sub agentpier-redis-${Stage}
      Description: !Sub "Subnet group for AgentPier Redis cache - ${Stage}"
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  RateLimitCacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub agentpier-redis-sg-${Stage}
      GroupDescription: !Sub "Security group for AgentPier Redis cache - ${Stage}"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          Description: "Allow Lambda access to Redis"
      Tags:
        - Key: Name
          Value: !Sub agentpier-redis-sg-${Stage}

  RateLimitCacheCluster:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupId: !Sub agentpier-redis-${Stage}
      ReplicationGroupDescription: !Sub "Redis cluster for AgentPier rate limiting - ${Stage}"
      CacheNodeType: !If [IsProduction, cache.r7g.large, cache.t3.micro]
      Port: 6379
      NumCacheClusters: !If [IsProduction, 2, 1]
      Engine: redis
      EngineVersion: "7.0"
      CacheParameterGroupName: default.redis7
      CacheSubnetGroupName: !Ref RateLimitCacheSubnetGroup
      SecurityGroupIds:
        - !Ref RateLimitCacheSecurityGroup
      AutomaticFailoverEnabled: !If [IsProduction, true, false]
      MultiAZEnabled: !If [IsProduction, true, false]
      PreferredMaintenanceWindow: "sun:05:00-sun:06:00"
      SnapshotRetentionLimit: !If [IsProduction, 7, 0]
      SnapshotWindow: "04:00-05:00"
      AtRestEncryptionEnabled: !If [IsProduction, true, false]
      TransitEncryptionEnabled: !If [IsProduction, true, false]
      Tags:
        - Key: Name
          Value: !Sub agentpier-redis-${Stage}
        - Key: Purpose
          Value: "Rate Limiting"

  # ============================================
  # VPC Configuration for Redis
  # ============================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub agentpier-vpc-${Stage}

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub agentpier-private-subnet-1-${Stage}

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub agentpier-private-subnet-2-${Stage}

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub agentpier-public-subnet-1-${Stage}

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub agentpier-public-subnet-2-${Stage}

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub agentpier-igw-${Stage}

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub agentpier-public-rt-${Stage}

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  NATGateway1EIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub agentpier-nat-eip-1-${Stage}

  NATGateway2EIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub agentpier-nat-eip-2-${Stage}

  NATGateway1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NATGateway1EIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub agentpier-nat-1-${Stage}

  NATGateway2:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NATGateway2EIP.AllocationId
      SubnetId: !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub agentpier-nat-2-${Stage}

  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub agentpier-private-rt-1-${Stage}

  PrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub agentpier-private-rt-2-${Stage}

  PrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway1

  PrivateRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway2

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable1

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable2

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub agentpier-lambda-sg-${Stage}
      GroupDescription: !Sub "Security group for AgentPier Lambda functions - ${Stage}"
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: "HTTPS outbound"
      Tags:
        - Key: Name
          Value: !Sub agentpier-lambda-sg-${Stage}

  # ============================================
  # S3 — Static Frontend
  # ============================================
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub agentpier-frontend-${Stage}
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

  # ============================================
  # Monitoring Infrastructure
  # ============================================

  # CloudWatch Log Groups for Lambda Functions
  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/agentpier-api-${Stage}"
      RetentionInDays: 7

  TrustScoringLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/agentpier-trust-scoring-${Stage}"
      RetentionInDays: 14

  # Lambda function for custom metrics collection
  MetricsCollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-metrics-collector-${Stage}
      Handler: monitoring.metrics_collector
      CodeUri: ../src/
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          METRICS_NAMESPACE: !Sub "AgentPier/${Stage}"
      Policies:
        - CloudWatchPutMetricPolicy: {}
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: "rate(5 minutes)"
            Description: "Collect AgentPier metrics every 5 minutes"

  # CloudWatch Alarms
  HighApiLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "AgentPier-${Stage}-High-API-Latency"
      AlarmDescription: "API Gateway response time is too high"
      MetricName: IntegrationLatency
      Namespace: AWS/ApiGateway
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5000  # 5 seconds
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiName
          Value: !Sub "agentpier-api-${Stage}"
      AlarmActions:
        - !Ref AlertingTopic

  HighApiErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "AgentPier-${Stage}-High-API-Error-Rate"
      AlarmDescription: "API error rate is too high"
      MetricName: 4XXError
      Namespace: AWS/ApiGateway
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiName
          Value: !Sub "agentpier-api-${Stage}"
      AlarmActions:
        - !Ref AlertingTopic

  DynamoDBReadThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "AgentPier-${Stage}-DynamoDB-Read-Throttles"
      AlarmDescription: "DynamoDB read requests are being throttled"
      MetricName: ReadThrottledRequests
      Namespace: AWS/DynamoDB
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: TableName
          Value: !Ref AgentPierTable
      AlarmActions:
        - !Ref AlertingTopic

  DynamoDBWriteThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "AgentPier-${Stage}-DynamoDB-Write-Throttles"
      AlarmDescription: "DynamoDB write requests are being throttled"
      MetricName: WriteThrottledRequests
      Namespace: AWS/DynamoDB
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: TableName
          Value: !Ref AgentPierTable
      AlarmActions:
        - !Ref AlertingTopic

  TrustScoreErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "AgentPier-${Stage}-Trust-Score-Errors"
      AlarmDescription: "Trust score calculation errors detected"
      MetricName: TrustScoreCalculationErrors
      Namespace: !Sub "AgentPier/${Stage}"
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertingTopic

  # SNS Topic for Alerting
  AlertingTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "AgentPier-${Stage}-Alerts"
      DisplayName: !Sub "AgentPier ${Stage} Monitoring Alerts"

  # CloudWatch Dashboard
  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "AgentPier-${Stage}-Monitoring"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ApiGateway", "IntegrationLatency", "ApiName", "agentpier-api-${Stage}" ],
                  [ ".", "Latency", ".", "." ]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "API Response Times",
                "yAxis": {
                  "left": {
                    "min": 0
                  }
                }
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ApiGateway", "Count", "ApiName", "agentpier-api-${Stage}" ],
                  [ ".", "4XXError", ".", "." ],
                  [ ".", "5XXError", ".", "." ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "API Request Volume & Errors"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${AgentPierTable}" ],
                  [ ".", "ConsumedWriteCapacityUnits", ".", "." ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "DynamoDB Capacity Usage"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/DynamoDB", "ReadThrottledRequests", "TableName", "${AgentPierTable}" ],
                  [ ".", "WriteThrottledRequests", ".", "." ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "DynamoDB Throttles"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 12,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AgentPier/${Stage}", "TrustScoreCalculations", { "stat": "Sum" } ],
                  [ ".", "TrustScoreCalculationErrors", { "stat": "Sum" } ]
                ],
                "period": 300,
                "region": "${AWS::Region}",
                "title": "Trust Score Operations"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 12,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AgentPier/${Stage}", "TrustScoreAccuracy", { "stat": "Average" } ],
                  [ ".", "AverageScoreCalculationTime", { "stat": "Average" } ]
                ],
                "period": 300,
                "region": "${AWS::Region}",
                "title": "Trust Score Performance"
              }
            }
          ]
        }

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${AgentPierApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  TableName:
    Description: DynamoDB table name
    Value: !Ref AgentPierTable
  FrontendBucket:
    Description: S3 bucket for static frontend
    Value: !Ref FrontendBucket
  DashboardUrl:
    Description: CloudWatch Dashboard URL
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${MonitoringDashboard}"
  AlertingTopicArn:
    Description: SNS Topic ARN for alerts
    Value: !Ref AlertingTopic
