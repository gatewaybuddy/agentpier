  UpdateProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-update-profile-${Stage}
      Handler: handlers.profile.update_profile
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /auth/profile
            Method: PATCH

  ChangePasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-change-password-${Stage}
      Handler: handlers.profile.change_password
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /auth/change-password
            Method: POST

  GetPublicProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-get-public-profile-${Stage}
      Handler: handlers.profile.get_public_profile
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /agents/{username}
            Method: GET

  # ============================================
  # Moltbook Identity Verification (Phase 3A)
  # ============================================

  MoltbookVerifyInitiateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-moltbook-verify-initiate-${Stage}
      Handler: handlers.moltbook.moltbook_verify_initiate
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /moltbook/verify
            Method: POST

  MoltbookVerifyConfirmFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-moltbook-verify-confirm-${Stage}
      Handler: handlers.moltbook.moltbook_verify_confirm
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /moltbook/verify/confirm
            Method: POST

  MoltbookTrustFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-moltbook-trust-${Stage}
      Handler: handlers.moltbook.moltbook_trust
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /moltbook/trust/{username}
            Method: GET

  MoltbookUnlinkFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-moltbook-unlink-${Stage}
      Handler: handlers.moltbook.moltbook_unlink
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /moltbook/unlink
            Method: POST

  # ============================================
  # Trust API (ACE-T)
  # ============================================

  TrustRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-trust-register-${Stage}
      Handler: handlers.trust.trust_register
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /trust/agents
            Method: POST

  TrustReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-trust-report-${Stage}
      Handler: handlers.trust.trust_report
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /trust/agents/{agent_id}/events
            Method: POST

  TrustQueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-trust-query-${Stage}
      Handler: handlers.trust.trust_query
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /trust/agents/{agent_id}
            Method: GET

  TrustSearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-trust-search-${Stage}
      Handler: handlers.trust.trust_search
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /trust/agents
            Method: GET

  # ============================================
  # Transaction API (Phase 2)
  # ============================================

  CreateTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-create-transaction-${Stage}
      Handler: handlers.transactions.create_transaction
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /transactions
            Method: POST

  GetTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-get-transaction-${Stage}
      Handler: handlers.transactions.get_transaction
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /transactions/{id}
            Method: GET

  ListTransactionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-list-transactions-${Stage}
      Handler: handlers.transactions.list_transactions
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /transactions
            Method: GET

  UpdateTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-update-transaction-${Stage}
      Handler: handlers.transactions.update_transaction
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /transactions/{id}
            Method: PATCH

  CreateReviewFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-create-review-${Stage}
      Handler: handlers.transactions.create_review
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /transactions/{id}/review
            Method: POST

  # ============================================
  # Fishing Mini-Game API
  # ============================================

  CastLineFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-cast-line-${Stage}
      Handler: handlers.fishing.cast_line
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /pier/cast
            Method: POST

  GetLeaderboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-get-leaderboard-${Stage}
      Handler: handlers.fishing.get_leaderboard
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /pier/leaderboard
            Method: GET

  GetTackleBoxFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-get-tackle-box-${Stage}
      Handler: handlers.fishing.get_tackle_box
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /pier/tackle-box
            Method: GET

  GetPierStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-get-pier-stats-${Stage}
      Handler: handlers.fishing.get_pier_stats
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /pier/stats
            Method: GET

  # ============================================
  # Scheduled — Content Moderation Scan (invoked via OpenClaw cron)
  # ============================================
  ModerationScanFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-moderation-scan-${Stage}
      Handler: handlers.moderation.moderation_scan_api
      CodeUri: ../src/
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /admin/moderation-scan
            Method: POST

  # ============================================
  # DynamoDB — Single Table Design
  # ============================================
  AgentPierTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub agentpier-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      # TTL configured via CLI (CloudFormation role lacks dynamodb:UpdateTimeToLive)
      # aws dynamodb update-time-to-live --table-name agentpier-dev --time-to-live-specification "Enabled=true,AttributeName=ttl"
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ============================================
  # S3 — Static Frontend
  # ============================================
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub agentpier-frontend-${Stage}
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${AgentPierApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  TableName:
    Description: DynamoDB table name
    Value: !Ref AgentPierTable
  FrontendBucket:
    Description: S3 bucket for static frontend
    Value: !Ref FrontendBucket
