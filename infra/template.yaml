AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AgentPier — Agent-native marketplace

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12
    Environment:
      Variables:
        TABLE_NAME: !Ref AgentPierTable
        STAGE: !Ref Stage
        CURSOR_SECRET: !Ref CursorSecret

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
  CursorSecret:
    Type: String
    NoEcho: true
    Description: Secret key for HMAC signing of pagination cursors
    MinLength: 32

Conditions:
  IsProduction: !Equals [!Ref Stage, prod]

Resources:

  # ============================================
  # API Gateway
  # ============================================
  AgentPierApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub agentpier-api-${Stage}
      StageName: !Ref Stage
      Auth:
        DefaultAuthorizer: NONE
      Cors:
        AllowOrigin: !If 
          - IsProduction
          - "'https://agentpier.org'"
          - "'https://agentpier.org,http://localhost:3000,http://localhost:8080'"
        AllowMethods: "'GET,POST,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-API-Key,Authorization'"

  # ============================================
  # Lambda Functions
  # ============================================
  
  CreateListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-create-listing-${Stage}
      Handler: handlers.listings.create_listing
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /listings
            Method: POST

  GetListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-get-listing-${Stage}
      Handler: handlers.listings.get_listing
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /listings/{id}
            Method: GET

  SearchListingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-search-listings-${Stage}
      Handler: handlers.listings.search_listings
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /listings
            Method: GET

  UpdateListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-update-listing-${Stage}
      Handler: handlers.listings.update_listing
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /listings/{id}
            Method: PATCH

  DeleteListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-delete-listing-${Stage}
      Handler: handlers.listings.delete_listing
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /listings/{id}
            Method: DELETE

  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-register-${Stage}
      Handler: handlers.auth.register
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /auth/register
            Method: POST

  GetMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-get-me-${Stage}
      Handler: handlers.auth.get_me
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /auth/me
            Method: GET

  RotateKeyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-rotate-key-${Stage}
      Handler: handlers.auth.rotate_key
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /auth/rotate-key
            Method: POST

  DeleteAccountFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-delete-account-${Stage}
      Handler: handlers.auth.delete_account
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /auth/me
            Method: DELETE

  # ============================================
  # Moltbook Integration (Phase 3)
  # ============================================

  LinkMoltbookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-link-moltbook-${Stage}
      Handler: handlers.auth.link_moltbook
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /auth/link-moltbook
            Method: POST

  UnlinkMoltbookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-unlink-moltbook-${Stage}
      Handler: handlers.auth.unlink_moltbook
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /auth/unlink-moltbook
            Method: POST

  # ============================================
  # Trust API (ACE-T)
  # ============================================

  TrustRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-trust-register-${Stage}
      Handler: handlers.trust.trust_register
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /trust/agents
            Method: POST

  TrustReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-trust-report-${Stage}
      Handler: handlers.trust.trust_report
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /trust/agents/{agent_id}/events
            Method: POST

  TrustQueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-trust-query-${Stage}
      Handler: handlers.trust.trust_query
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /trust/agents/{agent_id}
            Method: GET

  TrustSearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-trust-search-${Stage}
      Handler: handlers.trust.trust_search
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /trust/agents
            Method: GET

  # ============================================
  # Transaction API (Phase 2)
  # ============================================

  CreateTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-create-transaction-${Stage}
      Handler: handlers.transactions.create_transaction
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /transactions
            Method: POST

  GetTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-get-transaction-${Stage}
      Handler: handlers.transactions.get_transaction
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /transactions/{id}
            Method: GET

  ListTransactionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-list-transactions-${Stage}
      Handler: handlers.transactions.list_transactions
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /transactions
            Method: GET

  UpdateTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-update-transaction-${Stage}
      Handler: handlers.transactions.update_transaction
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /transactions/{id}
            Method: PATCH

  CreateReviewFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-create-review-${Stage}
      Handler: handlers.transactions.create_review
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /transactions/{id}/review
            Method: POST

  # ============================================
  # DynamoDB — Single Table Design
  # ============================================
  AgentPierTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub agentpier-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ============================================
  # S3 — Static Frontend
  # ============================================
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub agentpier-frontend-${Stage}
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${AgentPierApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  TableName:
    Description: DynamoDB table name
    Value: !Ref AgentPierTable
  FrontendBucket:
    Description: S3 bucket for static frontend
    Value: !Ref FrontendBucket
