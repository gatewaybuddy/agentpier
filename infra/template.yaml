AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AgentPier — Agent-native marketplace

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12
    VpcConfig:
      SecurityGroupIds:
        - !Ref LambdaSecurityGroup
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
    Environment:
      Variables:
        TABLE_NAME: !Ref AgentPierTable
        STAGE: !Ref Stage
        CURSOR_SECRET: !Ref CursorSecret
        DEPLOY_VERSION: "2026-02-22-v3"
        ADMIN_API_KEY: !Ref AdminApiKey
        REDIS_HOST: !GetAtt RateLimitCacheCluster.PrimaryEndPoint.Address
        REDIS_PORT: !GetAtt RateLimitCacheCluster.PrimaryEndPoint.Port
        METRICS_NAMESPACE: !Sub "AgentPier/${Stage}/RateLimit"


Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
  CursorSecret:
    Type: String
    NoEcho: true
    Description: Secret key for HMAC signing of pagination cursors
    MinLength: 32
  AdminApiKey:
    Type: String
    NoEcho: true
    Description: Admin API key for moderation endpoints
    Default: "none"

Conditions:
  IsProduction: !Equals [!Ref Stage, prod]

Resources:

  # ============================================
  # API Gateway
  # ============================================
  AgentPierApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub agentpier-api-${Stage}
      StageName: !Ref Stage
      Auth:
        DefaultAuthorizer: NONE
      Cors:
        AllowOrigin: !If 
          - IsProduction
          - "'https://agentpier.org'"
          - "'https://agentpier.org,http://localhost:3000,http://localhost:8080'"
        AllowMethods: "'GET,POST,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-API-Key,X-Admin-Key,X-Marketplace-Key,Authorization'"

  # ============================================
  # Lambda Functions
  # ============================================
  
  CreateListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-create-listing-${Stage}
      Handler: handlers.listings.create_listing
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /listings
            Method: POST

  GetListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-get-listing-${Stage}
      Handler: handlers.listings.get_listing
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /listings/{id}
            Method: GET

  SearchListingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-search-listings-${Stage}
      Handler: handlers.listings.search_listings
      CodeUri: ../src/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /listings
            Method: GET

  UpdateListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-update-listing-${Stage}
      Handler: handlers.listings.update_listing
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /listings/{id}
            Method: PATCH

  DeleteListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub agentpier-delete-listing-${Stage}
      Handler: handlers.listings.delete_listing
      CodeUri: ../src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AgentPierApi
            Path: /listings/{id}
            Method: DELETE

  RequestChallengeFunction:
