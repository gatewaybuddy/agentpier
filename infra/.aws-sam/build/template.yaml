AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "AgentPier \u2014 Agent-native marketplace"
Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12
    Environment:
      Variables:
        TABLE_NAME:
          Ref: AgentPierTable
        STAGE:
          Ref: Stage
        CURSOR_SECRET:
          Ref: CursorSecret
        DEPLOY_VERSION: 2026-02-22-v3
        ADMIN_API_KEY:
          Ref: AdminApiKey
Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
    - dev
    - prod
  CursorSecret:
    Type: String
    NoEcho: true
    Description: Secret key for HMAC signing of pagination cursors
    MinLength: 32
  AdminApiKey:
    Type: String
    NoEcho: true
    Description: Admin API key for moderation endpoints
    Default: none
Conditions:
  IsProduction:
    Fn::Equals:
    - Ref: Stage
    - prod
Resources:
  AgentPierApi:
    Type: AWS::Serverless::Api
    Properties:
      Name:
        Fn::Sub: agentpier-api-${Stage}
      StageName:
        Ref: Stage
      Auth:
        DefaultAuthorizer: NONE
      Cors:
        AllowOrigin:
          Fn::If:
          - IsProduction
          - '''https://agentpier.org'''
          - '''https://agentpier.org,http://localhost:3000,http://localhost:8080'''
        AllowMethods: '''GET,POST,PATCH,DELETE,OPTIONS'''
        AllowHeaders: '''Content-Type,X-API-Key,X-Admin-Key,X-Marketplace-Key,Authorization'''
  CreateListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: agentpier-create-listing-${Stage}
      Handler: handlers.listings.create_listing
      CodeUri: CreateListingFunction
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: AgentPierApi
            Path: /listings
            Method: POST
    Metadata:
      SamResourceId: CreateListingFunction
  GetListingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: agentpier-get-listing-${Stage}
      Handler: handlers.listings.get_listing
      CodeUri: GetListingFunction
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: AgentPierTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: AgentPierApi
            Path: /listings/{id}
            Method: GET
    Metadata:
      SamResourceId: GetListingFunction
  SearchListingsFunction:
